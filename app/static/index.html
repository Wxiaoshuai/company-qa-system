<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>企业知识问答</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel">
        <header class="hero">
          <div>
            <p class="eyebrow">Company QA System</p>
            <h1>企业知识问答</h1>
          </div>
          <div class="hero-actions">
            <div class="user-badge">
              <span id="current-user-name">加载中...</span>
              <a id="admin-link" class="ghost-link hidden" href="/admin">用户管理</a>
            </div>
            <button id="logout-button" class="ghost-button" type="button">退出登录</button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chat-form" class="composer">
          <label class="composer-label" for="question-input">输入你的问题</label>
          <div class="composer-row">
            <textarea
              id="question-input"
              name="question"
              rows="1"
              maxlength="2000"
              placeholder="例如：公司的年假政策是什么？"
            ></textarea>
            <button id="send-button" class="send-button" type="submit">发送</button>
          </div>
          <p id="status-text" class="status-text">消息仅保存在当前登录用户的浏览器本地。</p>
        </form>
      </section>
    </main>

    <template id="welcome-template">
      <section class="welcome-card">
        <article class="message assistant">
          <div class="bubble">
            <p class="message-role">助手</p>
            <p>你好，我会根据当前知识库内容回答问题。你可以直接提问，或点击下方快捷问题开始。</p>
          </div>
        </article>
        <div class="quick-grid">
          <button class="welcome-question" type="button" data-question="公司的年假政策是什么？">
            公司的年假政策是什么？
          </button>
          <button class="welcome-question" type="button" data-question="病假需要什么条件？">
            病假需要什么条件？
          </button>
          <button class="welcome-question" type="button" data-question="远程办公的规定是什么？">
            远程办公的规定是什么？
          </button>
        </div>
      </section>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
